# Service account in the external-secrets namespace for ESO IRSA.
# The Helm install of ESO must reference this SA via its ClusterSecretStore.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.eso.serviceAccountName }}
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.eso.roleArn | quote }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
