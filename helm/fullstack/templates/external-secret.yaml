# Pulls the DB credentials secret from Secrets Manager and creates a K8s secret.
# dataFrom.extract maps every JSON key to an individual secret key automatically.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.secrets.dbSecretName }}
---
# Pulls SECRET_KEY, FIRST_SUPERUSER, FIRST_SUPERUSER_PASSWORD.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-config
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.secrets.appSecretName }}
